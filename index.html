<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Text to Speech</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      resize: none;
      font-size: 16px;
    }

    select, input[type="range"], button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #4facfe;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #007bff;
    }

    button.active {
      background: #28a745;
    }

    .label {
      margin-top: 10px;
      font-weight: bold;
    }

    .rate-value {
      text-align: right;
      font-size: 14px;
      color: #555;
    }

    /* Хвиля */
    .wave {
      display: none;
      justify-content: center;
      align-items: flex-end;
      height: 30px;
      margin-top: 10px;
      gap: 4px;
    }

    .wave span {
      width: 5px;
      height: 10px;
      background: #4facfe;
      border-radius: 5px;
      animation: waveAnim 1s infinite ease-in-out;
    }

    .wave span:nth-child(2) { animation-delay: 0.1s; }
    .wave span:nth-child(3) { animation-delay: 0.2s; }
    .wave span:nth-child(4) { animation-delay: 0.3s; }
    .wave span:nth-child(5) { animation-delay: 0.4s; }

    @keyframes waveAnim {
      0%, 100% { height: 10px; }
      50% { height: 25px; }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Text to Speech</h1>

  <textarea id="text" placeholder="Введіть текст..."></textarea>

  <div class="label">Оберіть голос:</div>
  <select id="voiceSelect"></select>

  <div class="label">Швидкість мовлення:</div>
  <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
  <div class="rate-value">Швидкість: <span id="rateValue">1</span></div>

  <button id="speakBtn" onclick="speakText()">Слухати</button>

  <div class="wave" id="wave">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>

<script>
  const textInput = document.getElementById('text');
  const voiceSelect = document.getElementById('voiceSelect');
  const rate = document.getElementById('rate');
  const rateValue = document.getElementById('rateValue');
  const speakBtn = document.getElementById('speakBtn');
  const wave = document.getElementById('wave');

  let voices = [];

  function loadVoices() {
    voices = speechSynthesis.getVoices();
    voiceSelect.innerHTML = '';

    voices.forEach((voice, index) => {
      const option = document.createElement('option');
      option.value = index;
      option.textContent = `${voice.name} (${voice.lang})`;
      voiceSelect.appendChild(option);
    });
  }

  speechSynthesis.onvoiceschanged = loadVoices;

  function speakText() {
    if (textInput.value.trim() === '') {
      alert('Введіть текст!');
      return;
    }

    const utterance = new SpeechSynthesisUtterance(textInput.value);
    const selectedVoice = voices[voiceSelect.value];

    if (selectedVoice) {
      utterance.voice = selectedVoice;
    }

    utterance.rate = rate.value;

    // ▶️ Початок
    utterance.onstart = () => {
      speakBtn.classList.add('active');
      speakBtn.textContent = 'Говорить...';
      wave.style.display = 'flex';
    };

    // ⏹️ Кінець
    utterance.onend = () => {
      speakBtn.classList.remove('active');
      speakBtn.textContent = 'Слухати';
      wave.style.display = 'none';
    };

    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  }

  rate.addEventListener('input', () => {
    rateValue.textContent = rate.value;
  });

  loadVoices();
</script>

</body>
</html>
